  <script type="module">
  // Timeout: se Firebase falhar, libera o app em 8s
  const _fbTimer = (async () => {
    try {
      const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js");
      const { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
        = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js");
      const { getFirestore, doc, setDoc, collection, getDocs }
        = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");

      const app = initializeApp({
        apiKey: "AIzaSyAWirVMtRkvSlSs4vC9Udr7XGZCrBCfs6M",
        authDomain: "fittracker-42691.firebaseapp.com",
        projectId: "fittracker-42691",
        storageBucket: "fittracker-42691.firebasestorage.app",
        messagingSenderId: "397335004989",
        appId: "1:397335004989:web:baee2a7d1c234f8999e754"
      });
      const auth = getAuth(app);
      const db = getFirestore(app);
      const provider = new GoogleAuthProvider();

      function stripImages(sheets) {
        return (sheets||[]).map(s=>({...s,exercises:(s.exercises||[]).map(e=>({...e,image:""}))}));
      }

      async function smartSave(uid, key, val) {
        const json = JSON.stringify(val);
        const LIMIT = 900000;
        if (json.length <= LIMIT) {
          await setDoc(doc(db,"users",uid,"data",key), {v:json,chunked:false});
        } else {
          const arr = Array.isArray(val) ? val : [val];
          const chunks = []; let cur = [];
          for (const item of arr) {
            cur.push(item);
            if (JSON.stringify(cur).length > LIMIT) { cur.pop(); if(cur.length) chunks.push(cur); cur=[item]; }
          }
          if (cur.length) chunks.push(cur);
          for (let i=0; i<chunks.length; i++) {
            await setDoc(doc(db,"users",uid,"data",key+"__"+i), {v:JSON.stringify(chunks[i])});
          }
          await setDoc(doc(db,"users",uid,"data",key), {v:"[]",chunked:true,chunkCount:chunks.length});
        }
      }

      async function smartLoad(uid) {
        const snap = await getDocs(collection(db,"users",uid,"data"));
        const raw = {};
        snap.forEach(d=>{ raw[d.id]=d.data(); });
        const result = {};
        for (const [key,d] of Object.entries(raw)) {
          if (key.includes("__")) continue;
          try {
            if (d.chunked) {
              let combined=[];
              for (let i=0;i<d.chunkCount;i++) {
                const cd=raw[key+"__"+i]; if(cd&&cd.v) combined=combined.concat(JSON.parse(cd.v));
              }
              result[key]=combined;
            } else { result[key]=JSON.parse(d.v); }
          } catch(e) { console.warn("Load error",key,e); }
        }
        return result;
      }

      window._fb = {
        signIn: async () => { provider.setCustomParameters({prompt:"select_account"}); await signInWithPopup(auth,provider); },
        signOut: () => signOut(auth),
        onAuth: (cb) => onAuthStateChanged(auth,cb),
        saveData: async (uid, key, val) => { await smartSave(uid, key, key==="sheets" ? stripImages(val) : val); },
        loadAll: async (uid) => { return await smartLoad(uid); }
      };

      clearTimeout(_fbTimer);
      window.dispatchEvent(new Event("firebase-ready"));

    } catch(err) {
      console.error("Firebase init error:", err);
      // Fallback: libera o app sem sync
      if (!window._fb) {
        window._fb = {
          signIn: async () => { throw new Error("Erro de conexão: " + err.message); },
          signOut: () => {},
          onAuth: (cb) => cb(null),
          saveData: async () => {},
          loadAll: async () => ({})
        };
        window.dispatchEvent(new Event("firebase-ready"));
      }
    }
  })();
</script>

  const sec = s % 60;
  return `${String(m).padStart(2, "0")}:${String(sec).padStart(2, "0")}`;
};

// ─── BEEP FUNCTION ────────────────────────────────────────────────────────────
const playBeep = (freq = 880, duration = 300, times = 3) => {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    for (let i = 0; i < times; i++) {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = freq;
      osc.type = "sine";
      const start = ctx.currentTime + i * 0.4;
      osc.start(start);
      osc.stop(start + duration / 1000);
      gain.gain.setValueAtTime(0.3, start);
      gain.gain.exponentialRampToValueAtTime(0.001, start + duration / 1000);
    }
  } catch (e) {}
};

const load = (key, def) => {
  try { return JSON.parse(localStorage.getItem(key)) ?? def; } catch { return def; }
};
const save = (key, val) => { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} };

const LS = {
  save: (key, val) => { try { localStorage.setItem("ft_"+key, JSON.stringify(val)); } catch(e) {} },
  load: (key, def) => { try { const v = localStorage.getItem("ft_"+key); return v ? JSON.parse(v) : def; } catch(e) { return def; } }
};

function restoreImages(sheets) {
  return (sheets||[]).map(sheet => ({
    ...sheet,
    exercises: (sheet.exercises||[]).map(ex => {
      const dbEx = EXERCISE_DB.find(e => e.id === ex.id);
      return { ...ex, image: dbEx ? dbEx.image : (ex.image||"") };
    })
  }));
}

  const [syncing, setSyncing] = useState(false);
  const [syncMsg, setSyncMsg] = useState("");

  // Initialize state directly from localStorage — data available instantly
  const [workoutSheets, setWorkoutSheets] = useState(() => restoreImages(LS.load("sheets", [])));
  const [workoutHistory, setWorkoutHistory] = useState(() => LS.load("history", []));
  const [nutritionProfile, setNutritionProfile] = useState(() => LS.load("nutrition_profile", null));
  const [foodLog, setFoodLog] = useState(() => LS.load("food_log", {}));
  const [waterLog, setWaterLog] = useState(() => LS.load("water_log", {}));
  const [customFoods, setCustomFoods] = useState(() => LS.load("custom_foods", []));

  const today = new Date().toISOString().split("T")[0];
  const dataLoaded = useRef(false); // blocks sync until cloud data is loaded
  const syncTimeout = useRef({});
  const initialLoad = useRef(true);

  // Save to localStorage on every change (instant backup)
  useEffect(() => { LS.save("sheets", workoutSheets); }, [workoutSheets]);
  useEffect(() => { LS.save("history", workoutHistory); }, [workoutHistory]);
  useEffect(() => { LS.save("food_log", foodLog); }, [foodLog]);
  useEffect(() => { LS.save("water_log", waterLog); }, [waterLog]);
  useEffect(() => { LS.save("custom_foods", customFoods); }, [customFoods]);
  useEffect(() => { if (nutritionProfile) LS.save("nutrition_profile", nutritionProfile); }, [nutritionProfile]);

  // Firebase: load cloud data when user logs in, sync changes to cloud
  useEffect(() => {
    const loadUserData = async (u) => {
      setUser(u);
      if (!u) { dataLoaded.current = false; return; }
      if (u) {
        setSyncing(true);
        setSyncMsg("Sincronizando com a nuvem...");
        try {
          const all = await window._fb.loadAll(u.uid);
          // Cloud data wins over local if it exists
          if (all.sheets && all.sheets.length > 0) {
            const restored = restoreImages(all.sheets);
            setWorkoutSheets(restored);
            LS.save("sheets", restored);
          }
          if (all.history && all.history.length > 0) { setWorkoutHistory(all.history); LS.save("history", all.history); }
          if (all.nutrition_profile) { setNutritionProfile(all.nutrition_profile); LS.save("nutrition_profile", all.nutrition_profile); }
          if (all.food_log && Object.keys(all.food_log).length > 0) { setFoodLog(all.food_log); LS.save("food_log", all.food_log); }
          if (all.water_log && Object.keys(all.water_log).length > 0) { setWaterLog(all.water_log); LS.save("water_log", all.water_log); }
          if (all.custom_foods && all.custom_foods.length > 0) { setCustomFoods(all.custom_foods); LS.save("custom_foods", all.custom_foods); }
          setSyncMsg("✓ Sincronizado!");
        } catch(e) { setSyncMsg("☁ Dados locais"); }
        dataLoaded.current = true; // now safe to sync changes to cloud
        setTimeout(() => setSyncing(false), 2000);
      }
    };

    const setup = () => {
      if (!window._fb) return;
      window._fb.onAuth(loadUserData);
    };
    if (window._fb) setup();
    else window.addEventListener("firebase-ready", setup, { once: true });
  }, []);

  // Sync to cloud on changes (only when logged in, debounced)
  const syncToCloud = useCallback((key, data) => {
    if (!user || !dataLoaded.current) return; // never save until cloud load is done
    clearTimeout(syncTimeout.current[key]);
    syncTimeout.current[key] = setTimeout(async () => {
      try { await window._fb.saveData(user.uid, key, data); } catch(e) {}
    }, 2000);
  }, [user]);

  useEffect(() => { syncToCloud("sheets", workoutSheets); }, [workoutSheets, syncToCloud]);
  useEffect(() => { syncToCloud("history", workoutHistory); }, [workoutHistory, syncToCloud]);
  useEffect(() => { syncToCloud("food_log", foodLog); }, [foodLog, syncToCloud]);
  useEffect(() => { syncToCloud("water_log", waterLog); }, [waterLog, syncToCloud]);
  useEffect(() => { syncToCloud("custom_foods", customFoods); }, [customFoods, syncToCloud]);
  useEffect(() => { if (nutritionProfile) syncToCloud("nutrition_profile", nutritionProfile); }, [nutritionProfile, syncToCloud]);

// ─── WORKOUT TAB ──────────────────────────────────────────────────────────────
function WorkoutTab({ sheets, setSheets, onStartSession, history }) {
  const [view, setView] = useState("list"); // list | new | edit
  const [editSheet, setEditSheet] = useState(null);
  const [histView, setHistView] = useState(false);

  if (histView) return <WorkoutHistory history={history} onBack={() => setHistView(false)} />;
  if (view === "new" || view === "edit") return (
    <SheetEditor
      sheet={editSheet}
      onSave={(s) => {
        if (view === "edit") setSheets(sh => sh.map(x => x.id === s.id ? s : x));
        else setSheets(sh => [...sh, s]);
        setView("list"); setEditSheet(null);
      }}
      onCancel={() => { setView("list"); setEditSheet(null); }}

          onEdit={() => { setEditSheet(sheet); setView("edit"); }}

      ))}

// ─── WORKOUT SESSION ──────────────────────────────────────────────────────────
function WorkoutSession({ session, onFinish, onCancel }) {
  const { sheet } = session;

  // localSets mirrors sheet exercises but with editable reps/weight
  const [localExercises, setLocalExercises] = useState(
    sheet.exercises.map(ex => ({ ...ex, sets: ex.sets.map(s => ({ ...s })) }))
  );

  const [exIdx, setExIdx]     = useState(0);
  const [setIdx, setSetIdx]   = useState(0);
  const [phase, setPhase]     = useState("exec");
  const [elapsed, setElapsed] = useState(0);
  const [restLeft, setRestLeft] = useState(0);
  const [running, setRunning] = useState(false);
  const [completed, setCompleted] = useState([]);
  const [totalTime, setTotalTime] = useState(0);
  const intervalRef     = useRef(null);
  const totalIntervalRef = useRef(null);

  const ex  = localExercises[exIdx];
  const set = ex?.sets[setIdx];

  // Total time counter
  useEffect(() => {
    totalIntervalRef.current = setInterval(() => setTotalTime(t => t + 1), 1000);
    return () => clearInterval(totalIntervalRef.current);
  }, []);

  // Exec / rest timer
  useEffect(() => {
    if (running) {
      intervalRef.current = setInterval(() => {
        if (phase === "exec") {
          setElapsed(t => {
            const next = t + 1;
            if (ex?.execTime > 0 && next >= ex.execTime) playBeep(880, 200, 3);
            return next;
          });
        } else {
          setRestLeft(t => {
            if (t <= 1) { playBeep(1200, 200, 3); clearInterval(intervalRef.current); setRunning(false); return 0; }
            return t - 1;
          });
        }
      }, 1000);
    } else { clearInterval(intervalRef.current); }
    return () => clearInterval(intervalRef.current);
  }, [running, phase, ex]);

  // Update reps or weight for current set
  const updateSet = (field, value) => {
    setLocalExercises(exs => exs.map((e, ei) => ei !== exIdx ? e : {
      ...e,
      sets: e.sets.map((s, si) => si !== setIdx ? s : { ...s, [field]: Number(value) || 0 })
    }));
  };

  const handleCompleteSet = () => {
    const record = { exId: ex.id, exName: ex.name, setIdx, reps: set.reps, weight: set.weight, duration: set.duration, execTime: elapsed };
    setCompleted(c => [...c, record]);
    setRunning(false); setElapsed(0);
    setRestLeft(ex.restTime || 60);
    setPhase("rest"); setRunning(true);
  };

  const handleNextSet = () => {
    setRunning(false); setElapsed(0); setPhase("exec");
    const nextSet = setIdx + 1;
    if (nextSet < ex.sets.length) {
      setSetIdx(nextSet);
    } else {
      const nextEx = exIdx + 1;
      if (nextEx < localExercises.length) {
        setExIdx(nextEx); setSetIdx(0);
      } else {
        clearInterval(totalIntervalRef.current);
        // Pass updated exercises back so caller can persist new weights
        onFinish({
          id: genId(),
          sheetName: sheet.name,
          date: new Date().toLocaleDateString("pt-BR"),
          totalTime,
          completed,
          updatedExercises: localExercises, // ← weights/reps to persist
          sheetId: sheet.id,
        });
      }
    }
  };

  const progress = ((exIdx * 100) / localExercises.length) + ((setIdx / (ex?.sets?.length || 1)) * (100 / localExercises.length));

  return (
    <div>
      {/* Header */}
      <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "14px 0 10px" }}>
        <IconBtn onClick={onCancel} icon={icons.close} danger />
        <div style={{ flex: 1 }}>
          <div style={{ fontWeight: 800, fontSize: 17 }}>{sheet.name}</div>
          <div style={{ fontSize: 11, color: "#5a5a7a" }}>{formatTime(totalTime)} de treino</div>
        </div>
      </div>

      {/* Progress bar */}
      <div style={{ height: 4, background: "#1e1e2e", borderRadius: 2, marginBottom: 14 }}>
        <div style={{ height: 4, background: "linear-gradient(90deg,#00e5a0,#00b4d8)", borderRadius: 4, width: `${progress}%`, transition: "width .5s" }} />
      </div>

      {/* Exercise nav */}
      <div style={{ display: "flex", gap: 6, overflowX: "auto", paddingBottom: 10, marginBottom: 10 }}>
        {localExercises.map((e, i) => (
          <div key={e.id} style={{ minWidth: 32, height: 32, borderRadius: 10, background: i < exIdx ? "#00e5a020" : i === exIdx ? "#00e5a0" : "#1e1e2e", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 700, color: i === exIdx ? "#0d0d12" : i < exIdx ? "#00e5a0" : "#5a5a7a" }}>
            {i + 1}
          </div>
        ))}
      </div>

      {/* Exercise card */}
      {ex && (
        <div style={{ background: "#13131f", borderRadius: 18, padding: 18, border: "1px solid #1e1e2e" }}>
          {ex.image && <img src={ex.image} style={{ width: "100%", height: 180, objectFit: "contain", borderRadius: 12, background: "#fff", marginBottom: 14 }} alt="" />}
          <div style={{ fontSize: 20, fontWeight: 800, marginBottom: 4 }}>{ex.name}</div>
          <div style={{ fontSize: 13, color: "#5a5a7a", marginBottom: 14 }}>Série {setIdx + 1} de {ex.sets.length}</div>

          {/* Sets list */}
          {ex.sets.map((s, i) => {
            const isDone = completed.some(c => c.exId === ex.id && c.setIdx === i);
            const isCurrent = i === setIdx;
            return (
              <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 14px", borderRadius: 12, background: isCurrent ? "#00e5a015" : "#0d0d12", border: `1px solid ${isCurrent ? "#00e5a040" : "#1e1e2e"}`, marginBottom: 6, opacity: i > setIdx ? 0.5 : 1 }}>
                <div style={{ width: 26, height: 26, borderRadius: 8, background: isDone ? "#00e5a020" : "#1e1e2e", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12, fontWeight: 700, color: isDone ? "#00e5a0" : "#5a5a7a", flexShrink: 0 }}>
                  {isDone ? "✓" : i + 1}
                </div>

                {isCurrent ? (
                  // ── Editable inputs for current set ──────────────────
                  ex.useWeight !== false ? (
                    <>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontSize: 10, color: "#5a5a7a", marginBottom: 3 }}>REPS</div>
                        <input type="number" inputMode="numeric" value={s.reps}
                          onChange={e => updateSet("reps", e.target.value)}
                          style={{ width: "100%", background: "#1e1e2e", border: "1px solid #00e5a040", borderRadius: 8, padding: "8px 10px", color: "#f0f0f5", fontSize: 16, fontWeight: 700, outline: "none", textAlign: "center" }} />
                      </div>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontSize: 10, color: "#5a5a7a", marginBottom: 3 }}>PESO (kg)</div>
                        <input type="number" inputMode="decimal" value={s.weight}
                          onChange={e => updateSet("weight", e.target.value)}
                          style={{ width: "100%", background: "#1e1e2e", border: "1px solid #00e5a040", borderRadius: 8, padding: "8px 10px", color: "#f0f0f5", fontSize: 16, fontWeight: 700, outline: "none", textAlign: "center" }} />
                      </div>
                    </>
                  ) : (
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 10, color: "#5a5a7a", marginBottom: 3 }}>DURAÇÃO (seg)</div>
                      <input type="number" inputMode="numeric" value={s.duration || 0}
                        onChange={e => updateSet("duration", e.target.value)}
                        style={{ width: "100%", background: "#1e1e2e", border: "1px solid #00e5a040", borderRadius: 8, padding: "8px 10px", color: "#f0f0f5", fontSize: 16, fontWeight: 700, outline: "none", textAlign: "center" }} />
                    </div>
                  )
                ) : (
                  // ── Read-only for other sets ──────────────────────────
                  <div style={{ flex: 1, fontSize: 13, color: isDone ? "#00e5a0" : "#8888aa" }}>
                    {ex.useWeight !== false
                      ? `${s.reps} reps · ${s.weight} kg`
                      : `${s.duration || 0}s`}
                  </div>
                )}
                {isCurrent && <span style={{ fontSize: 11, color: "#00e5a0", fontWeight: 700 }}>ATUAL</span>}
              </div>
            );
          })}

          {/* Timer */}
          <div style={{ marginTop: 18, textAlign: "center" }}>
            {phase === "exec" ? (
              <>
                <div style={{ fontSize: 11, color: "#5a5a7a", marginBottom: 6, textTransform: "uppercase", letterSpacing: 1 }}>
                  {ex.execTime > 0 ? `Execução (${formatTime(ex.execTime - elapsed)} restante)` : "Cronômetro de Execução"}
                </div>
                <div style={{ fontSize: 52, fontWeight: 900, fontVariantNumeric: "tabular-nums", color: ex.execTime > 0 && elapsed >= ex.execTime ? "#ff4d6d" : "#00e5a0", lineHeight: 1, marginBottom: 14 }}>
                  {formatTime(elapsed)}
                </div>
                <div style={{ display: "flex", gap: 10, justifyContent: "center" }}>
                  <button onClick={() => setRunning(r => !r)} style={{ padding: "12px 24px", borderRadius: 12, border: "none", background: running ? "#1e1e2e" : "#00e5a0", color: running ? "#f0f0f5" : "#0d0d12", fontWeight: 700, fontSize: 14, cursor: "pointer" }}>
                    {running ? "⏸ Pausar" : "▶ Iniciar"}
                  </button>
                  <button onClick={handleCompleteSet} style={{ padding: "12px 24px", borderRadius: 12, border: "none", background: "#00b4d8", color: "#0d0d12", fontWeight: 700, fontSize: 14, cursor: "pointer" }}>
                    ✓ Concluir Série
                  </button>
                </div>
              </>
            ) : (
              <>
                <div style={{ fontSize: 11, color: "#f59e0b", marginBottom: 6, textTransform: "uppercase", letterSpacing: 1 }}>Descanso</div>
                <div style={{ fontSize: 52, fontWeight: 900, fontVariantNumeric: "tabular-nums", color: restLeft <= 10 ? "#ff4d6d" : "#f59e0b", lineHeight: 1, marginBottom: 14 }}>
                  {formatTime(restLeft)}
                </div>
                <button onClick={handleNextSet} style={{ padding: "13px 32px", borderRadius: 12, border: "none", background: "linear-gradient(135deg,#00e5a0,#00b4d8)", color: "#0d0d12", fontWeight: 700, fontSize: 15, cursor: "pointer" }}>
                  {setIdx + 1 < ex.sets.length ? "Próxima Série →" : exIdx + 1 < localExercises.length ? "Próximo Exercício →" : "🏁 Finalizar Treino"}
                </button>
              </>
            )}
          </div>
        </div>
      )}
    </div>
  );
}

// ─── NUTRITION TAB ────────────────────────────────────────────────────────────
function NutritionTab({ profile, setProfile, foodLog, setFoodLog, waterLog, setWaterLog, today, customFoods = [], setCustomFoods }) {
  const [view, setView] = useState(profile ? "dashboard" : "setup");
  const [addingFood, setAddingFood] = useState(false);

  const todayFoods = foodLog[today] || [];
  const todayWater = waterLog[today] || 0;
  const totalCal = todayFoods.reduce((s, f) => s + f.cal, 0);
  const totalProt = todayFoods.reduce((s, f) => s + f.prot, 0);
  const totalCarb = todayFoods.reduce((s, f) => s + f.carb, 0);
  const totalFat = todayFoods.reduce((s, f) => s + f.fat, 0);

  if (view === "setup") return (
    <NutritionSetup
      profile={profile}
      onSave={(p) => { setProfile(p); setView("dashboard"); }}
    />
  );

  if (addingFood) return (
    <AddFood
      onAdd={(food) => {
        setFoodLog(fl => ({ ...fl, [today]: [...(fl[today] || []), food] }));
        setAddingFood(false);
      }}
      onCancel={() => setAddingFood(false)}
      customFoods={customFoods}
      onSaveCustomFood={(f) => setCustomFoods(cf => [...cf, f])}
    />
  );

  const goal = profile?.targetCal || 2000;
  const waterGoal = profile?.waterGoal || 2500;

  return (
    <div>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "16px 0 12px" }}>
        <div style={{ fontSize: 22, fontWeight: 800 }}>Nutrição</div>
        <Btn small ghost onClick={() => setView("setup")}>⚙ Perfil</Btn>
      </div>

      {/* Calorie ring */}
      <div style={{ background: "#13131f", borderRadius: 18, padding: 20, marginBottom: 12, border: "1px solid #1e1e2e", display: "flex", alignItems: "center", gap: 20 }}>
        <CalRing consumed={totalCal} goal={goal} />
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 13, color: "#5a5a7a", marginBottom: 2 }}>CONSUMIDO HOJE</div>
          <div style={{ fontSize: 32, fontWeight: 900 }}>{Math.round(totalCal)}<span style={{ fontSize: 14, fontWeight: 400, color: "#5a5a7a" }}> kcal</span></div>
          <div style={{ fontSize: 13, color: "#5a5a7a" }}>Meta: {goal} kcal · Restam: {Math.max(0, goal - Math.round(totalCal))}</div>
          <div style={{ marginTop: 8, height: 6, background: "#1e1e2e", borderRadius: 6, overflow: "hidden" }}>
            <div style={{ height: "100%", width: `${Math.min(100, (totalCal / goal) * 100)}%`, background: totalCal > goal ? "#ff4d6d" : "linear-gradient(90deg, #00e5a0, #00b4d8)", borderRadius: 6, transition: "width .5s" }} />
          </div>
        </div>
      </div>

      {/* Macros */}
      <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 8, marginBottom: 12 }}>
        {[
          { label: "Proteína", val: totalProt, goal: profile?.protGoal || 150, color: "#00e5a0", unit: "g" },
          { label: "Carb", val: totalCarb, goal: profile?.carbGoal || 250, color: "#00b4d8", unit: "g" },
          { label: "Gordura", val: totalFat, goal: profile?.fatGoal || 65, color: "#f59e0b", unit: "g" },
        ].map(({ label, val, goal: g, color, unit }) => (
          <div key={label} style={{ background: "#13131f", borderRadius: 14, padding: 12, border: "1px solid #1e1e2e", textAlign: "center" }}>
            <div style={{ fontSize: 11, color: "#5a5a7a", marginBottom: 4 }}>{label}</div>
            <div style={{ fontSize: 20, fontWeight: 800, color }}>{Math.round(val)}<span style={{ fontSize: 11 }}>{unit}</span></div>
            <div style={{ fontSize: 10, color: "#5a5a7a" }}>/ {g}{unit}</div>
            <div style={{ height: 4, background: "#1e1e2e", borderRadius: 4, marginTop: 6, overflow: "hidden" }}>
              <div style={{ height: "100%", width: `${Math.min(100, (val / g) * 100)}%`, background: color, borderRadius: 4 }} />
            </div>
          </div>
        ))}
      </div>

      {/* Water */}
      <div style={{ background: "#13131f", borderRadius: 16, padding: 14, marginBottom: 12, border: "1px solid #1e1e2e" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <Icon d={icons.water} size={18} color="#00b4d8" />
            <div>
              <div style={{ fontWeight: 700, fontSize: 14 }}>Hidratação</div>
              <div style={{ fontSize: 12, color: "#5a5a7a" }}>{todayWater}ml / {waterGoal}ml</div>
            </div>
          </div>
          <div style={{ display: "flex", gap: 6 }}>
            {[250, 500].map(ml => (
              <button key={ml} onClick={() => setWaterLog(wl => ({ ...wl, [today]: (wl[today] || 0) + ml }))}
                style={{ padding: "7px 12px", borderRadius: 10, border: "none", background: "#1e1e2e", color: "#00b4d8", fontWeight: 700, fontSize: 12, cursor: "pointer" }}>
                +{ml}ml
              </button>
            ))}
          </div>
        </div>
        <div style={{ height: 6, background: "#1e1e2e", borderRadius: 6, marginTop: 10, overflow: "hidden" }}>
          <div style={{ height: "100%", width: `${Math.min(100, (todayWater / waterGoal) * 100)}%`, background: "linear-gradient(90deg, #00b4d8, #7dd3fc)", borderRadius: 6, transition: "width .5s" }} />
        </div>
      </div>

      {/* Foods today */}
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
        <div style={{ fontWeight: 700, fontSize: 15 }}>Alimentos de Hoje</div>
        <Btn small onClick={() => setAddingFood(true)}>+ Adicionar</Btn>
      </div>
      {todayFoods.length === 0 && <EmptyState icon={icons.target} text="Nenhum alimento registrado" sub="Adicione o que você comeu hoje" small />}
      {todayFoods.map((food, i) => (
        <div key={i} style={{ background: "#13131f", borderRadius: 12, padding: "10px 14px", marginBottom: 7, border: "1px solid #1e1e2e", display: "flex", alignItems: "center", gap: 12 }}>
          <div style={{ flex: 1 }}>
            <div style={{ fontWeight: 600, fontSize: 13 }}>{food.name}</div>
            <div style={{ fontSize: 11, color: "#5a5a7a" }}>{food.portion}g · P:{Math.round(food.prot)}g C:{Math.round(food.carb)}g G:{Math.round(food.fat)}g</div>
          </div>
          <div style={{ fontWeight: 800, color: "#00e5a0", fontSize: 15 }}>{Math.round(food.cal)} kcal</div>
          <IconBtn onClick={() => setFoodLog(fl => ({ ...fl, [today]: fl[today].filter((_, j) => j !== i) }))} icon={icons.trash} danger small />
        </div>
      ))}
    </div>
  );
}

// ─── CAL RING ─────────────────────────────────────────────────────────────────
function CalRing({ consumed, goal }) {
  const pct = Math.min(1, consumed / goal);
  const r = 36; const circ = 2 * Math.PI * r;
  return (
    <svg width={88} height={88} viewBox="0 0 88 88">
      <circle cx={44} cy={44} r={r} fill="none" stroke="#1e1e2e" strokeWidth={8} />
      <circle cx={44} cy={44} r={r} fill="none" stroke={consumed > goal ? "#ff4d6d" : "#00e5a0"} strokeWidth={8}
        strokeDasharray={circ} strokeDashoffset={circ * (1 - pct)} strokeLinecap="round"
        transform="rotate(-90 44 44)" style={{ transition: "stroke-dashoffset .6s" }} />
      <text x={44} y={48} textAnchor="middle" fontSize={14} fontWeight={800} fill="#f0f0f5">{Math.round(pct * 100)}%</text>
    </svg>
  );
}

// ─── NUTRITION SETUP ──────────────────────────────────────────────────────────
function NutritionSetup({ profile, onSave }) {
  const [weight, setWeight] = useState(profile?.weight || "");
  const [height, setHeight] = useState(profile?.height || "");
  const [age, setAge] = useState(profile?.age || "");
  const [sex, setSex] = useState(profile?.sex || "male");
  const [activity, setActivity] = useState(profile?.activity || 1.375);
  const [goal, setGoal] = useState(profile?.goal || "maintain");
  const [calc, setCalc] = useState(null);

  const calculate = () => {
    if (!weight || !height || !age) return alert("Preencha todos os campos!");
    const w = parseFloat(weight), h = parseFloat(height), a = parseInt(age);
    const bmr = sex === "male" ? 88.36 + (13.4 * w) + (4.8 * h) - (5.7 * a) : 447.6 + (9.2 * w) + (3.1 * h) - (4.3 * a);
    const tdee = bmr * parseFloat(activity);
    const targetCal = goal === "lose" ? tdee - 500 : goal === "gain" ? tdee + 300 : tdee;
    const protGoal = Math.round(w * (goal === "gain" ? 2.2 : 1.8));
    const fatGoal = Math.round((targetCal * 0.25) / 9);
    const carbGoal = Math.round((targetCal - protGoal * 4 - fatGoal * 9) / 4);
    const waterGoal = Math.round(w * 35);
    setCalc({ bmr: Math.round(bmr), tdee: Math.round(tdee), targetCal: Math.round(targetCal), protGoal, fatGoal, carbGoal, waterGoal });
    onSave({ weight: w, height: h, age: a, sex, activity: parseFloat(activity), goal, targetCal: Math.round(targetCal), protGoal, fatGoal, carbGoal, waterGoal });
  };

  return (
    <div>
      <div style={{ fontSize: 22, fontWeight: 800, padding: "16px 0 12px" }}>Perfil Nutricional</div>
      <div style={{ background: "#13131f", borderRadius: 16, padding: 16, marginBottom: 14, border: "1px solid #1e1e2e" }}>
        <Row>
          <Field label="Peso (kg)" value={weight} onChange={setWeight} type="number" placeholder="70" />
          <Field label="Altura (cm)" value={height} onChange={setHeight} type="number" placeholder="175" />
          <Field label="Idade" value={age} onChange={setAge} type="number" placeholder="25" />
        </Row>
        <div style={{ marginTop: 12 }}>
          <div style={{ fontSize: 12, color: "#5a5a7a", marginBottom: 6 }}>SEXO</div>
          <div style={{ display: "flex", gap: 8 }}>
            {[["male", "♂ Masculino"], ["female", "♀ Feminino"]].map(([v, l]) => (
              <button key={v} onClick={() => setSex(v)} style={{ flex: 1, padding: 10, borderRadius: 10, border: "none", background: sex === v ? "#00e5a0" : "#1e1e2e", color: sex === v ? "#0d0d12" : "#8888aa", fontWeight: 600, cursor: "pointer", fontSize: 13 }}>{l}</button>
            ))}
          </div>
        </div>
        <div style={{ marginTop: 12 }}>
          <div style={{ fontSize: 12, color: "#5a5a7a", marginBottom: 6 }}>NÍVEL DE ATIVIDADE</div>
          <select value={activity} onChange={e => setActivity(e.target.value)} style={{ width: "100%", background: "#1e1e2e", border: "none", borderRadius: 10, padding: "10px 12px", color: "#f0f0f5", fontSize: 13, outline: "none" }}>
            <option value={1.2}>Sedentário (sem exercício)</option>
            <option value={1.375}>Levemente ativo (1-3x/sem)</option>
            <option value={1.55}>Moderadamente ativo (3-5x/sem)</option>
            <option value={1.725}>Muito ativo (6-7x/sem)</option>
            <option value={1.9}>Extremamente ativo (atleta)</option>
          </select>
        </div>
        <div style={{ marginTop: 12 }}>
          <div style={{ fontSize: 12, color: "#5a5a7a", marginBottom: 6 }}>OBJETIVO</div>
          <div style={{ display: "flex", gap: 8 }}>
            {[["lose", "🔥 Emagrecer"], ["maintain", "⚖ Manter"], ["gain", "💪 Ganhar massa"]].map(([v, l]) => (
              <button key={v} onClick={() => setGoal(v)} style={{ flex: 1, padding: "8px 4px", borderRadius: 10, border: "none", background: goal === v ? "#00e5a0" : "#1e1e2e", color: goal === v ? "#0d0d12" : "#8888aa", fontWeight: 600, cursor: "pointer", fontSize: 11 }}>{l}</button>
            ))}
          </div>
        </div>
      </div>
      <Btn full onClick={calculate}>Calcular e Salvar</Btn>
      {calc && (
        <div style={{ background: "#13131f", borderRadius: 16, padding: 16, marginTop: 14, border: "1px solid #00e5a040" }}>
          <div style={{ fontWeight: 700, fontSize: 15, color: "#00e5a0", marginBottom: 10 }}>✓ Calculado!</div>
          {[["TMB (Basal)", calc.bmr + " kcal"], ["Gasto total (TDEE)", calc.tdee + " kcal"], ["Meta calórica diária", calc.targetCal + " kcal"], ["Proteína", calc.protGoal + "g/dia"], ["Carboidrato", calc.carbGoal + "g/dia"], ["Gordura", calc.fatGoal + "g/dia"], ["Água", calc.waterGoal + "ml/dia"]].map(([k, v]) => (
            <div key={k} style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", borderBottom: "1px solid #1e1e2e", fontSize: 13 }}>
              <span style={{ color: "#8888aa" }}>{k}</span>
              <span style={{ fontWeight: 700 }}>{v}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── ADD FOOD ─────────────────────────────────────────────────────────────────
function AddFood({ onAdd, onCancel, customFoods = [], onSaveCustomFood }) {
  const [tab, setTab] = useState("library"); // library | custom | myfoods
  const [search, setSearch] = useState("");
  const [selectedCat, setSelectedCat] = useState("Todos");
  const [selected, setSelected] = useState(null);
  const [portionIdx, setPortionIdx] = useState(0);
  const [customGrams, setCustomGrams] = useState("");
  const [customData, setCustomData] = useState({ name: "", cal: "", prot: "", carb: "", fat: "", portion: "100", portionLabel: "100g" });
  const [savedMsg, setSavedMsg] = useState(false);

  const allFoods = [...FOOD_DB, ...customFoods];
  const cats = ["Todos", ...FOOD_CATS, ...(customFoods.length ? ["⭐ Meus Alimentos"] : [])];

  const results = allFoods.filter(f => {
    const matchSearch = f.name.toLowerCase().includes(search.toLowerCase());
    const matchCat = selectedCat === "Todos" || f.cat === selectedCat || (selectedCat === "⭐ Meus Alimentos" && f.custom);
    return matchSearch && matchCat;
  }).slice(0, 12);

  const currentPortions = selected ? [...(selected.portions || [{ label: "100g", g: 100 }]), { label: "Personalizado", g: null }] : [];
  const isCustomPortion = selected && portionIdx === currentPortions.length - 1;
  const effectiveGrams = isCustomPortion ? parseFloat(customGrams || 0) : currentPortions[portionIdx]?.g || 100;

  const handleSelectFood = (f) => {
    setSelected(f);
    setPortionIdx(0);
    setCustomGrams("");
  };

  const getCalPreview = () => {
    if (!selected || effectiveGrams <= 0) return null;
    const factor = effectiveGrams / 100;
    return {
      cal: Math.round(selected.cal * factor),
      prot: Math.round(selected.prot * factor * 10) / 10,
      carb: Math.round(selected.carb * factor * 10) / 10,
      fat: Math.round(selected.fat * factor * 10) / 10,
    };
  };

  const handleAdd = () => {
    if (tab === "library" || tab === "myfoods") {
      if (!selected) return alert("Selecione um alimento!");
      if (effectiveGrams <= 0) return alert("Informe a porção!");
      const preview = getCalPreview();
      const portionLabel = isCustomPortion ? `${effectiveGrams}g` : currentPortions[portionIdx]?.label;
      onAdd({ name: `${selected.name} (${portionLabel})`, portion: effectiveGrams, ...preview });
    } else {
      if (!customData.name || !customData.cal) return alert("Preencha nome e calorias!");
      const factor = parseFloat(customData.portion) / 100;
      onAdd({
        name: `${customData.name} (${customData.portionLabel || customData.portion + "g"})`,
        portion: parseFloat(customData.portion),
        cal: Math.round(parseFloat(customData.cal) * factor),
        prot: Math.round(parseFloat(customData.prot || 0) * factor * 10) / 10,
        carb: Math.round(parseFloat(customData.carb || 0) * factor * 10) / 10,
        fat: Math.round(parseFloat(customData.fat || 0) * factor * 10) / 10,
      });
    }
  };

  const handleSaveCustomFood = () => {
    if (!customData.name || !customData.cal) return alert("Preencha nome e calorias!");
    onSaveCustomFood({
      id: genId(), name: customData.name, cal: parseFloat(customData.cal),
      prot: parseFloat(customData.prot || 0), carb: parseFloat(customData.carb || 0),
      fat: parseFloat(customData.fat || 0), cat: "⭐ Meus Alimentos", custom: true,
      portions: [{ label: customData.portionLabel || "100g", g: parseFloat(customData.portion) || 100 },
                 { label: "100g", g: 100 }]
    });
    setSavedMsg(true);
    setTimeout(() => setSavedMsg(false), 2000);
  };

  const preview = getCalPreview();

  return (
    <div>
      <div style={{ display: "flex", alignItems: "center", gap: 12, padding: "16px 0 10px" }}>
        <IconBtn onClick={onCancel} icon={icons.arrow} />
        <div style={{ fontSize: 20, fontWeight: 800 }}>Adicionar Alimento</div>
      </div>

      {/* Tabs */}
      <div style={{ display: "flex", gap: 6, marginBottom: 12 }}>
        {[["library", "📚 Biblioteca"], ["custom", "✏️ Novo"], ["myfoods", "⭐ Meus"]].map(([v, l]) => (
          <button key={v} onClick={() => { setTab(v); setSelected(null); }} style={{ flex: 1, padding: "8px 4px", borderRadius: 10, border: "none", background: tab === v ? "#00e5a0" : "#13131f", color: tab === v ? "#0d0d12" : "#8888aa", fontWeight: 600, fontSize: 12, cursor: "pointer" }}>{l}</button>
        ))}
      </div>

      {/* LIBRARY TAB */}
      {tab === "library" && (
        <>
          <input value={search} onChange={e => { setSearch(e.target.value); setSelected(null); }} placeholder="🔍 Buscar alimento..." style={{ width: "100%", background: "#13131f", border: "1px solid #1e1e2e", borderRadius: 12, padding: "11px 14px", color: "#f0f0f5", fontSize: 14, outline: "none", boxSizing: "border-box", marginBottom: 8 }} />

          {/* Category chips */}
          <div style={{ display: "flex", gap: 6, overflowX: "auto", paddingBottom: 8, marginBottom: 8 }}>
            {cats.map(c => (
              <button key={c} onClick={() => { setSelectedCat(c); setSelected(null); }} style={{ whiteSpace: "nowrap", padding: "5px 12px", borderRadius: 20, border: "none", background: selectedCat === c ? "#00e5a0" : "#13131f", color: selectedCat === c ? "#0d0d12" : "#8888aa", fontSize: 11, fontWeight: 600, cursor: "pointer" }}>{c}</button>
            ))}
          </div>

          {/* Food list */}
          <div style={{ maxHeight: 280, overflowY: "auto", marginBottom: 10 }}>
            {results.length === 0 && <div style={{ textAlign: "center", padding: 20, color: "#5a5a7a", fontSize: 13 }}>Nenhum resultado</div>}
            {results.map(f => (
              <div key={f.id} onClick={() => handleSelectFood(f)} style={{ padding: "10px 14px", borderRadius: 12, background: selected?.id === f.id ? "#00e5a015" : "#13131f", border: `1px solid ${selected?.id === f.id ? "#00e5a040" : "#1e1e2e"}`, marginBottom: 5, cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div>
                  <div style={{ fontWeight: 600, fontSize: 13 }}>{f.name}</div>
                  <div style={{ fontSize: 10, color: "#5a5a7a", marginTop: 1 }}>{f.cat} · {f.cal}kcal/100g</div>
                </div>
                <div style={{ fontSize: 13, fontWeight: 700, color: "#00e5a0" }}>{f.cal}<span style={{ fontSize: 9, color: "#5a5a7a" }}>/100g</span></div>
              </div>
            ))}
          </div>

          {/* Portion selector */}
          {selected && (
            <div style={{ background: "#13131f", borderRadius: 14, padding: 14, border: "1px solid #00e5a030", marginBottom: 10 }}>
              <div style={{ fontSize: 12, color: "#5a5a7a", marginBottom: 8, fontWeight: 600 }}>PORÇÃO — {selected.name}</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 8 }}>
                {currentPortions.map((p, i) => (
                  <button key={i} onClick={() => setPortionIdx(i)} style={{ padding: "6px 12px", borderRadius: 20, border: "none", background: portionIdx === i ? "#00e5a0" : "#1e1e2e", color: portionIdx === i ? "#0d0d12" : "#8888aa", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>{p.label}</button>
                ))}
              </div>
              {isCustomPortion && (
                <input type="number" value={customGrams} onChange={e => setCustomGrams(e.target.value)} placeholder="Gramas personalizados..."
                  style={{ width: "100%", background: "#1e1e2e", border: "none", borderRadius: 10, padding: "9px 12px", color: "#f0f0f5", fontSize: 14, outline: "none", boxSizing: "border-box", marginBottom: 8 }} />
              )}
              {preview && effectiveGrams > 0 && (
                <div style={{ display: "flex", gap: 8, marginTop: 4 }}>
                  {[["Calorias", preview.cal, "kcal", "#00e5a0"], ["Prot", preview.prot, "g", "#00b4d8"], ["Carb", preview.carb, "g", "#f59e0b"], ["Gord", preview.fat, "g", "#f87171"]].map(([l, v, u, c]) => (
                    <div key={l} style={{ flex: 1, textAlign: "center", background: "#0d0d12", borderRadius: 10, padding: "8px 4px" }}>
                      <div style={{ fontSize: 15, fontWeight: 800, color: c }}>{v}</div>
                      <div style={{ fontSize: 10, color: "#5a5a7a" }}>{l} {u}</div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}
        </>
      )}

      {/* CUSTOM FOOD TAB */}
      {tab === "custom" && (
        <div style={{ background: "#13131f", borderRadius: 14, padding: 14, border: "1px solid #1e1e2e", marginBottom: 12 }}>
          <Field label="Nome do alimento" value={customData.name} onChange={v => setCustomData(d => ({ ...d, name: v }))} placeholder="Ex: Coxinha da vovó" />
          <div style={{ marginTop: 10 }}>
            <Row>
              <Field label="Kcal (por 100g)" value={customData.cal} onChange={v => setCustomData(d => ({ ...d, cal: v }))} type="number" />
              <Field label="Proteína (g/100g)" value={customData.prot} onChange={v => setCustomData(d => ({ ...d, prot: v }))} type="number" />
            </Row>
          </div>
          <div style={{ marginTop: 8 }}>
            <Row>
              <Field label="Carb (g/100g)" value={customData.carb} onChange={v => setCustomData(d => ({ ...d, carb: v }))} type="number" />
              <Field label="Gordura (g/100g)" value={customData.fat} onChange={v => setCustomData(d => ({ ...d, fat: v }))} type="number" />
            </Row>
          </div>
          <div style={{ marginTop: 8 }}>
            <Row>
              <Field label="Porção que vai comer (g)" value={customData.portion} onChange={v => setCustomData(d => ({ ...d, portion: v }))} type="number" />
              <Field label="Nome da porção (ex: 1 fatia)" value={customData.portionLabel} onChange={v => setCustomData(d => ({ ...d, portionLabel: v }))} placeholder="100g" />
            </Row>
          </div>
          <button onClick={handleSaveCustomFood} style={{ width: "100%", marginTop: 12, padding: "8px 0", borderRadius: 10, border: "1px dashed #00e5a040", background: "none", color: savedMsg ? "#00e5a0" : "#5a5a7a", fontSize: 13, cursor: "pointer" }}>
            {savedMsg ? "✓ Salvo na biblioteca!" : "💾 Salvar na minha biblioteca"}
          </button>
        </div>
      )}

      {/* MY FOODS TAB */}
      {tab === "myfoods" && (
        <>
          {customFoods.length === 0 ? (
            <div style={{ textAlign: "center", padding: "30px 0", color: "#5a5a7a", fontSize: 13 }}>Nenhum alimento salvo ainda.<br />Crie na aba "Novo"!</div>
          ) : (
            <div style={{ maxHeight: 320, overflowY: "auto", marginBottom: 10 }}>
              {customFoods.map(f => (
                <div key={f.id} onClick={() => handleSelectFood(f)} style={{ padding: "10px 14px", borderRadius: 12, background: selected?.id === f.id ? "#00e5a015" : "#13131f", border: `1px solid ${selected?.id === f.id ? "#00e5a040" : "#1e1e2e"}`, marginBottom: 5, cursor: "pointer" }}>
                  <div style={{ fontWeight: 600, fontSize: 13 }}>{f.name}</div>
                  <div style={{ fontSize: 10, color: "#5a5a7a" }}>{f.cal}kcal/100g · P:{f.prot}g C:{f.carb}g G:{f.fat}g</div>
                </div>
              ))}
            </div>
          )}
          {selected && (
            <div style={{ background: "#13131f", borderRadius: 14, padding: 14, border: "1px solid #00e5a030", marginBottom: 10 }}>
              <div style={{ fontSize: 12, color: "#5a5a7a", marginBottom: 8 }}>PORÇÃO</div>
              <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                {currentPortions.map((p, i) => (
                  <button key={i} onClick={() => setPortionIdx(i)} style={{ padding: "6px 12px", borderRadius: 20, border: "none", background: portionIdx === i ? "#00e5a0" : "#1e1e2e", color: portionIdx === i ? "#0d0d12" : "#8888aa", fontSize: 12, fontWeight: 600, cursor: "pointer" }}>{p.label}</button>
                ))}
              </div>
              {isCustomPortion && <input type="number" value={customGrams} onChange={e => setCustomGrams(e.target.value)} placeholder="Gramas..." style={{ width: "100%", background: "#1e1e2e", border: "none", borderRadius: 10, padding: "9px 12px", color: "#f0f0f5", fontSize: 14, outline: "none", boxSizing: "border-box", marginTop: 8 }} />}
              {preview && effectiveGrams > 0 && (
                <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
                  {[["Cal", preview.cal, "kcal", "#00e5a0"], ["Prot", preview.prot, "g", "#00b4d8"], ["Carb", preview.carb, "g", "#f59e0b"], ["Gord", preview.fat, "g", "#f87171"]].map(([l, v, u, c]) => (
                    <div key={l} style={{ flex: 1, textAlign: "center", background: "#0d0d12", borderRadius: 10, padding: "8px 4px" }}>
                      <div style={{ fontSize: 15, fontWeight: 800, color: c }}>{v}</div>
                      <div style={{ fontSize: 10, color: "#5a5a7a" }}>{l}</div>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}
        </>
      )}

      <Btn full onClick={handleAdd}>Adicionar ao Diário</Btn>
    </div>
  );
}

// ─── UI PRIMITIVES ────────────────────────────────────────────────────────────
function Btn({ children, onClick, full, small, ghost, style = {} }) {
  return (
    <button onClick={onClick} style={{ background: ghost ? "transparent" : "linear-gradient(135deg, #00e5a0, #00b4d8)", border: ghost ? "1px solid #2e2e4e" : "none", borderRadius: small ? 10 : 12, padding: small ? "8px 14px" : "13px 20px", color: ghost ? "#8888aa" : "#0d0d12", fontWeight: 700, fontSize: small ? 13 : 14, cursor: "pointer", width: full ? "100%" : undefined, ...style }}>
      {children}
    </button>
  );
}

function IconBtn({ onClick, icon, danger, small }) {
  return (
    <button onClick={onClick} style={{ width: small ? 28 : 34, height: small ? 28 : 34, borderRadius: 9, background: danger ? "#ff4d6d15" : "#1e1e2e", border: "none", display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer", color: danger ? "#ff4d6d" : "#8888aa" }}>
      <Icon d={icon} size={small ? 14 : 16} color="currentColor" />
    </button>
  );
}

function Field({ label, value, onChange, type = "text", placeholder = "" }) {
  return (
    <div style={{ flex: 1 }}>
      {label && <div style={{ fontSize: 11, color: "#5a5a7a", marginBottom: 5, textTransform: "uppercase", letterSpacing: 0.5 }}>{label}</div>}
      <input type={type} value={value} onChange={e => onChange(e.target.value)} placeholder={placeholder}
        style={{ width: "100%", background: "#1e1e2e", border: "none", borderRadius: 10, padding: "9px 12px", color: "#f0f0f5", fontSize: 14, outline: "none", boxSizing: "border-box" }} />
    </div>
  );
}

function Row({ children }) {
  return <div style={{ display: "flex", gap: 10 }}>{children}</div>;
}

function EmptyState({ icon, text, sub, small }) {
  return (
    <div style={{ textAlign: "center", padding: small ? "20px 0" : "40px 0" }}>
      <Icon d={icon} size={small ? 32 : 40} color="#2e2e4e" />
      <div style={{ fontSize: small ? 14 : 16, fontWeight: 600, color: "#3e3e5e", marginTop: 10 }}>{text}</div>
      {sub && <div style={{ fontSize: 12, color: "#2e2e4e", marginTop: 4 }}>{sub}</div>}
    </div>
  );
}

window._appStarted = true;
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(FitTrackerApp));
  </script>
</body>
